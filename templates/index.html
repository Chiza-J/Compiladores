<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Compilador</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
 
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
    :root {
      --bg-deep:    #050810;
      --bg-panel:   #090d1a;
      --bg-card:    #0d1225;
      --border:     #1a2340;
      --border-glow:#2a3a6a;
      --text-main:  #c8d8f8;
      --text-muted: #4a5a7a;
      --text-dim:   #2a3a5a;
      --accent-blue:#4f8ef7;
      --accent-cyan:#00d4ff;
      --accent-green:#22f08a;
      --accent-red:  #ff4d6a;
      --accent-amber:#f5a623;
      --accent-purple:#a855f7;
      --glow-blue: 0 0 18px rgba(79,142,247,0.35);
      --glow-green: 0 0 18px rgba(34,240,138,0.3);
      --glow-red:   0 0 18px rgba(255,77,106,0.3);
      --glow-amber: 0 0 18px rgba(245,166,35,0.3);
    }
 
    html, body, #root {
      height: 100%;
      background: var(--bg-deep);
      color: var(--text-main);
      font-family: 'Syne', sans-serif;
      overflow: hidden;
    }
 
    /* Subtle grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(79,142,247,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(79,142,247,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }
 
    #root { position: relative; z-index: 1; }
 
    /* ─── LAYOUT ─── */
    .app {
      display: grid;
      grid-template-columns: 220px 1fr;
      grid-template-rows: 52px 1fr;
      height: 100vh;
    }
 
    /* ─── TOPBAR ─── */
    .topbar {
      grid-column: 1 / -1;
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 12px;
      position: relative;
    }
    .topbar-logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 15px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent-cyan);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .topbar-logo svg { flex-shrink: 0; }
    .topbar-divider {
      width: 1px;
      height: 24px;
      background: var(--border);
    }
    .topbar-tag {
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-muted);
      letter-spacing: 0.05em;
    }
    .topbar-status {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-muted);
    }
    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent-green);
      box-shadow: 0 0 8px var(--accent-green);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%,100% { opacity:1; } 50% { opacity:0.4; }
    }
 
    /* ─── SIDEBAR ─── */
    .sidebar {
      background: var(--bg-panel);
      border-right: 1px solid var(--border);
      padding: 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      overflow-y: auto;
    }
    .sidebar-section {
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
      padding: 10px 8px 4px;
      margin-top: 4px;
    }
    .sidebar-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 10px 12px;
      border: 1px solid transparent;
      border-radius: 8px;
      background: transparent;
      color: var(--text-muted);
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.18s ease;
      text-align: left;
      letter-spacing: 0.03em;
    }
    .sidebar-btn:hover {
      background: rgba(79,142,247,0.08);
      border-color: var(--border-glow);
      color: var(--text-main);
    }
    .sidebar-btn.active {
      background: rgba(79,142,247,0.12);
      border-color: var(--accent-blue);
      color: var(--accent-blue);
    }
    .sidebar-btn .btn-icon {
      width: 28px; height: 28px;
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      font-size: 13px;
    }
    .btn-analizar .btn-icon  { background: rgba(79,142,247,0.15); color: var(--accent-blue); }
    .btn-limpiar  .btn-icon  { background: rgba(74,90,122,0.2);   color: var(--text-muted); }
    .btn-descargar .btn-icon { background: rgba(168,85,247,0.15); color: var(--accent-purple); }
    .btn-cargar   .btn-icon  { background: rgba(0,212,255,0.1);   color: var(--accent-cyan); }
    .btn-tokens   .btn-icon  { background: rgba(34,240,138,0.12); color: var(--accent-green); }
    .btn-errores  .btn-icon  { background: rgba(255,77,106,0.12); color: var(--accent-red); }
    .btn-recup    .btn-icon  { background: rgba(245,166,35,0.12); color: var(--accent-amber); }
 
    /* Color accent on left border */
    .btn-tokens   { border-left: 2px solid var(--accent-green) !important; }
    .btn-errores  { border-left: 2px solid var(--accent-red) !important; }
    .btn-recup    { border-left: 2px solid var(--accent-amber) !important; }
 
    /* ─── MAIN AREA ─── */
    .main {
      display: grid;
      grid-template-rows: 1fr 180px 200px;
      overflow: hidden;
    }
 
    /* ─── EDITOR ─── */
    .editor-pane {
      position: relative;
      padding: 12px 12px 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .pane-label {
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .pane-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .editor-wrap {
      flex: 1;
      position: relative;
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      transition: border-color 0.2s;
    }
    .editor-wrap:focus-within {
      border-color: var(--accent-blue);
      box-shadow: var(--glow-blue);
    }
    .editor-gutter {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 44px;
      background: var(--bg-panel);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 14px 0;
      overflow: hidden;
      pointer-events: none;
    }
    .line-num {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--text-dim);
      text-align: right;
      padding-right: 10px;
      line-height: 21px;
      min-height: 21px;
    }
    .code-textarea {
      position: absolute;
      inset: 0;
      left: 44px;
      background: var(--bg-card);
      color: var(--accent-cyan);
      border: none;
      padding: 14px 14px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      line-height: 21px;
      resize: none;
      outline: none;
      tab-size: 2;
      caret-color: var(--accent-cyan);
    }
    .code-textarea::selection { background: rgba(79,142,247,0.25); }
    .code-textarea.placeholder { color: var(--text-dim); }
 
    /* ─── CONSOLE ─── */
    .console-pane {
      border-top: 1px solid var(--border);
      background: #020409;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .console-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .console-title {
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
    }
    .console-dot { width: 7px; height: 7px; border-radius: 50%; }
    .console-output {
      flex: 1;
      overflow-y: auto;
      padding: 10px 16px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      line-height: 1.7;
      color: var(--accent-green);
      white-space: pre-wrap;
    }
    .console-output::-webkit-scrollbar { width: 4px; }
    .console-output::-webkit-scrollbar-track { background: transparent; }
    .console-output::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
 
    /* ─── VIEWER ─── */
    .viewer-pane {
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .viewer-header {
      display: flex;
      align-items: center;
      padding: 6px 14px;
      border-bottom: 1px solid var(--border);
      gap: 8px;
      flex-shrink: 0;
    }
    .viewer-tabs {
      display: flex;
      gap: 4px;
      margin-left: auto;
    }
    .viewer-tab {
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      padding: 3px 10px;
      border-radius: 4px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--text-dim);
      cursor: pointer;
      transition: all 0.15s;
    }
    .viewer-tab:hover { color: var(--text-muted); border-color: var(--border); }
    .viewer-tab.active { background: rgba(79,142,247,0.1); border-color: var(--accent-blue); color: var(--accent-blue); }
    .viewer-frame {
      flex: 1;
      border: none;
      background: white;
    }
    .viewer-empty {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 10px;
      color: var(--text-dim);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
    }
 
    /* ─── ANALYZING OVERLAY ─── */
    .analyzing-bar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent-cyan), var(--accent-blue), transparent);
      background-size: 200% 100%;
      animation: slide 1.2s infinite linear;
    }
    @keyframes slide {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
 
    /* ─── SCROLLBAR GLOBAL ─── */
    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-track { background: transparent; }
    .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>
{% raw %}
  <div id="root"></div>
 
  <script type="text/babel">
    const { useState, useRef, useEffect, useCallback } = React;
 
    const PLACEHOLDER = "// Escribe tu código aquí...\n";
 
    function App() {
      const [code, setCode]           = useState(PLACEHOLDER);
      const [isPlaceholder, setIsPlaceholder] = useState(true);
      const [consoleText, setConsoleText]     = useState("> Consola lista...\n");
      const [frameUrl, setFrameUrl]           = useState("");
      const [activeTab, setActiveTab]         = useState(null);
      const [analyzing, setAnalyzing]         = useState(false);
      const textareaRef = useRef(null);
      const fileInputRef = useRef(null);
 
      // Line numbers
      const lineCount = code.split("\n").length;
      const lines = Array.from({ length: Math.max(lineCount, 20) }, (_, i) => i + 1);
 
      const handleFocus = () => {
        if (isPlaceholder) {
          setCode("");
          setIsPlaceholder(false);
        }
      };
 
      const handleBlur = () => {
        if (code.trim() === "") {
          setCode(PLACEHOLDER);
          setIsPlaceholder(true);
        }
      };
 
      const handleChange = (e) => {
        setCode(e.target.value);
        setIsPlaceholder(false);
      };
 
      const handleTab = (e) => {
        if (e.key === "Tab") {
          e.preventDefault();
          const start = e.target.selectionStart;
          const end   = e.target.selectionEnd;
          const next  = code.substring(0, start) + "  " + code.substring(end);
          setCode(next);
          requestAnimationFrame(() => {
            e.target.selectionStart = e.target.selectionEnd = start + 2;
          });
        }
      };
 
      const analizar = async () => {
        if (isPlaceholder) return;
        setAnalyzing(true);
        setConsoleText("> Analizando...\n");
        try {
          const res  = await fetch("/analizar", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ codigo: code }),
          });
          const data = await res.json();
          setConsoleText(data.salida);
        } catch (err) {
          setConsoleText(`> Error de conexión: ${err.message}\n`);
        } finally {
          setAnalyzing(false);
        }
      };
 
      const cargar = (ruta, tab) => {
        setFrameUrl(ruta);
        setActiveTab(tab);
      };
 
      const confirmarLimpiar = () => {
        if (window.confirm("¿Seguro que quieres limpiar todo el entorno?")) {
          setCode(PLACEHOLDER);
          setIsPlaceholder(true);
          setConsoleText("> Entorno reiniciado...\n");
          setFrameUrl("");
          setActiveTab(null);
        }
      };
 
      const descargar = () => window.open("/descargar");
 
      const handleFile = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        if (!file.name.endsWith(".leng")) {
          alert("Solo se permiten archivos .leng");
          return;
        }
        const reader = new FileReader();
        reader.onload = (ev) => {
          setCode(ev.target.result);
          setIsPlaceholder(false);
        };
        reader.readAsText(file);
        e.target.value = "";
      };
 
      return (
        <div className="app">
 
          {/* ── TOPBAR ── */}
          <div className="topbar">
            <div className="topbar-logo">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                <path d="M4 6l4 4-4 4M11 18h9" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/>
              </svg>
              Compilador
            </div>
            <div className="topbar-divider"/>
            <span className="topbar-tag">Lenguaje v1.0</span>
            <div className="topbar-status">
              <span className="status-dot"/>
              <span>servidor activo</span>
            </div>
          </div>
 
          {/* ── SIDEBAR ── */}
          <div className="sidebar">
            <span className="sidebar-section">Acciones</span>
 
            <button className="sidebar-btn btn-analizar" onClick={analizar} disabled={analyzing}>
              <span className="btn-icon">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none">
                  <path d="M5 3l14 9-14 9V3z" fill="currentColor"/>
                </svg>
              </span>
              {analyzing ? "Analizando…" : "Analizar"}
            </button>
 
            <button className="sidebar-btn btn-limpiar" onClick={confirmarLimpiar}>
              <span className="btn-icon">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none">
                  <path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                </svg>
              </span>
              Limpiar
            </button>
 
            <button className="sidebar-btn btn-descargar" onClick={descargar}>
              <span className="btn-icon">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none">
                  <path d="M12 3v12m0 0l-4-4m4 4l4-4M3 17v2a2 2 0 002 2h14a2 2 0 002-2v-2" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                </svg>
              </span>
              Descargar
            </button>
 
            <button className="sidebar-btn btn-cargar" onClick={() => fileInputRef.current.click()}>
              <span className="btn-icon">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none">
                  <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                </svg>
              </span>
              Cargar .leng
            </button>
            <input
              ref={fileInputRef}
              type="file"
              accept=".leng"
              style={{ display: "none" }}
              onChange={handleFile}
            />
 
            <span className="sidebar-section">Reportes</span>
 
            <button
              className={`sidebar-btn btn-tokens ${activeTab === "tokens" ? "active" : ""}`}
              onClick={() => cargar("/tokens", "tokens")}
            >
              <span className="btn-icon">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none">
                  <rect x="3" y="3" width="18" height="18" rx="2" stroke="currentColor" strokeWidth="2"/>
                  <path d="M3 9h18M9 21V9" stroke="currentColor" strokeWidth="2"/>
                </svg>
              </span>
              Tokens
            </button>
 
            <button
              className={`sidebar-btn btn-errores ${activeTab === "errores" ? "active" : ""}`}
              onClick={() => cargar("/errores", "errores")}
            >
              <span className="btn-icon">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none">
                  <circle cx="12" cy="12" r="9" stroke="currentColor" strokeWidth="2"/>
                  <path d="M12 8v4M12 16h.01" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/>
                </svg>
              </span>
              Errores
            </button>
 
            <button
              className={`sidebar-btn btn-recup ${activeTab === "recup" ? "active" : ""}`}
              onClick={() => cargar("/recuperables", "recup")}
            >
              <span className="btn-icon">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none">
                  <path d="M4 12a8 8 0 018-8v4l4-4-4-4v4a10 10 0 100 10" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/>
                </svg>
              </span>
              Recuperables
            </button>
          </div>
 
          {/* ── MAIN ── */}
          <div className="main">
 
            {/* Editor */}
            <div className="editor-pane">
              <div className="pane-label">Editor de código</div>
              <div className="editor-wrap">
                <div className="editor-gutter">
                  {lines.map(n => (
                    <div key={n} className="line-num">{n}</div>
                  ))}
                </div>
                <textarea
                  ref={textareaRef}
                  className={`code-textarea${isPlaceholder ? " placeholder" : ""}`}
                  value={code}
                  onChange={handleChange}
                  onFocus={handleFocus}
                  onBlur={handleBlur}
                  onKeyDown={handleTab}
                  spellCheck={false}
                  autoComplete="off"
                  autoCorrect="off"
                  autoCapitalize="off"
                />
                {analyzing && <div className="analyzing-bar"/>}
              </div>
            </div>
 
            {/* Console */}
            <div className="console-pane">
              <div className="console-header">
                <div className="console-dot" style={{ background: "#ff5f57" }}/>
                <div className="console-dot" style={{ background: "#febc2e" }}/>
                <div className="console-dot" style={{ background: "#28c840" }}/>
                <span className="console-title" style={{ marginLeft: 6 }}>Consola de salida</span>
              </div>
              <div className="console-output">{consoleText}</div>
            </div>
 
            {/* Viewer */}
            <div className="viewer-pane">
              <div className="viewer-header">
                <span className="pane-label" style={{ marginBottom: 0 }}>Visor de reportes</span>
                <div className="viewer-tabs">
                  {[
                    { key: "tokens",  label: "Tokens",  color: "var(--accent-green)" },
                    { key: "errores", label: "Errores", color: "var(--accent-red)" },
                    { key: "recup",   label: "Recuperables", color: "var(--accent-amber)" },
                  ].map(t => (
                    <button
                      key={t.key}
                      className={`viewer-tab ${activeTab === t.key ? "active" : ""}`}
                      style={activeTab === t.key ? { borderColor: t.color, color: t.color, background: t.color + "18" } : {}}
                      onClick={() => cargar(`/${t.key === "recup" ? "recuperables" : t.key}`, t.key)}
                    >
                      {t.label}
                    </button>
                  ))}
                </div>
              </div>
              {frameUrl ? (
                <iframe className="viewer-frame" src={frameUrl} key={frameUrl}/>
              ) : (
                <div className="viewer-empty">
                  <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
                    <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/>
                  </svg>
                  <span>Analiza primero para ver reportes</span>
                </div>
              )}
            </div>
 
          </div>
        </div>
      );
    }
 
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
{% endraw %}
</body>
</html>
