<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Compilador</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    display: flex;
    height: 100vh;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #0f172a;
}


.sidebar {
    width: 240px;
    background: #020617;
    color: white;
    padding: 20px;
    border-right: 2px solid #1e293b;
}

.sidebar h2 {
    text-align: center;
    margin-bottom: 20px;
}

button {
    width: 100%;
    margin: 8px 0;
    padding: 12px;
    border: none;
    cursor: pointer;
    border-radius: 8px;
    font-weight: bold;
    transition: 0.2s;
}

button:hover {
    transform: scale(1.03);
    opacity: 0.9;
}

.tokens { background: #22c55e; }
.errores { background: #ef4444; }
.recuperables { background: #f59e0b; }
.analizar { background: #3b82f6; }
.limpiar { background: #64748b; }


.main {
    flex: 1;
    display: flex;
    flex-direction: column;
}


.editor {
    height: 35%;
    padding: 10px;
}

textarea {
    width: 100%;
    height: 100%;
    background: #020617;
    color: #64748b;
    border: 1px solid #334155;
    border-radius: 10px;
    padding: 15px;
    font-family: monospace;
    font-size: 14px;
    outline: none;
}

.consola {
    height: 30%;
    background: black;
    color: #22c55e;
    padding: 10px;
    font-family: monospace;
    overflow-y: auto;
    border-top: 2px solid #1e293b;
}


.visor {
    height: 35%;
    background: #0f172a;
    border-top: 2px solid #1e293b;
}

iframe {
    width: 100%;
    height: 100%;
    border: none;
    background: white;
}
</style>
</head>

<body>

<div class="sidebar">
    <h2>⚙ Compilador</h2>

    <button class="analizar" onclick="analizar()">▶ Analizar</button>
    <button class="limpiar" onclick="confirmarLimpiar()">🧹 Limpiar</button>

    <hr style="margin: 15px 0; border: 1px solid #1e293b;">

    <button class="tokens" onclick="cargar('/tokens')">📄 Tokens</button>
    <button class="errores" onclick="cargar('/errores')">❌ Errores</button>
    <button class="recuperables" onclick="cargar('/recuperables')">⚠ Recuperables</button>
</div>

<div class="main">

    <div class="editor">
        <textarea id="codigo">Escribe tu código aquí...</textarea>
    </div>

    <div class="consola" id="consola">
> Consola lista...
    </div>

    <div class="visor">
        <iframe id="frame"></iframe>
    </div>

</div>

<script>
const textarea = document.getElementById("codigo");
const placeholder = "Escribe tu código aquí...";


textarea.addEventListener("focus", () => {
    if (textarea.value === placeholder) {
        textarea.value = "";
        textarea.style.color = "#e2e8f0";
    }
});

textarea.addEventListener("blur", () => {
    if (textarea.value.trim() === "") {
        textarea.value = placeholder;
        textarea.style.color = "#64748b";
    }
});

// ANALIZA LOS ERRORES
function analizar() {
    const codigo = textarea.value;

    document.getElementById("consola").innerText = "> Analizando...\n";

    fetch('/analizar', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ codigo })
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("consola").innerText += data.salida;
    });
}

// CARGA LOS 3 REPORTES
function cargar(ruta) {
    document.getElementById("frame").src = ruta;
}

function confirmarLimpiar() {
    const confirmacion = confirm("¿Seguro que quieres limpiar todo el entorno?");

    if (confirmacion) {
        limpiar();
    }
}

// ACA LIMPIA EL EDITOR, LA CONSOLA Y LOS REPORTES
function limpiar() {
    
    textarea.value = placeholder;
    textarea.style.color = "#64748b";

    document.getElementById("consola").innerText = "> Entorno reiniciado...\n";

    document.getElementById("frame").src = "";
}
</script>

</body>
</html>
