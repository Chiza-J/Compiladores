<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <title>Tabla de Simbolos</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:          #050810;
      --bg-panel:    #090d1a;
      --bg-card:     #0d1225;
      --border:      #1a2340;
      --text-main:   #c8d8f8;
      --text-muted:  #7a9cc8;
      --text-dim:    #3a4a6a;
      --green:       #22f08a;
      --green-dim:   rgba(34,240,138,0.08);
      --green-border:rgba(34,240,138,0.2);
      --cyan:        #00d4ff;
      --blue:        #4f8ef7;
      --purple:      #a855f7;
      --amber:       #f5a623;
      --red:         #ff4d6a;
    }
    body {
      background: var(--bg);
      color: var(--text-main);
      font-family: 'JetBrains Mono', monospace;
      padding: 24px;
      min-height: 100vh;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(79,142,247,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(79,142,247,0.025) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    /* ── header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 16px;
    }
    .header-icon {
      width: 36px; height: 36px;
      border-radius: 8px;
      background: var(--green-dim);
      border: 1px solid var(--green-border);
      display: flex; align-items: center; justify-content: center;
      color: var(--green);
      flex-shrink: 0;
    }
    .header h1 {
      font-family: 'Syne', sans-serif;
      font-size: 16px;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--green);
    }
    .header .subtitle {
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 0.06em;
      margin-top: 2px;
    }
    .badge {
      margin-left: auto;
      background: var(--green-dim);
      border: 1px solid var(--green-border);
      color: var(--green);
      font-size: 11px;
      padding: 4px 12px;
      border-radius: 20px;
      letter-spacing: 0.05em;
      white-space: nowrap;
    }

    /* ── leyenda ── */
    .leyenda {
      display: flex;
      gap: 20px;
      margin-bottom: 16px;
      flex-wrap: wrap;
      padding: 10px 14px;
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 8px;
    }
    .leyenda-grupo {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .leyenda-titulo {
      font-size: 9px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 2px;
    }
    .leyenda-items {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .leyenda-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: var(--text-muted);
    }
    .leyenda-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── tabla ── */
    .table-wrap {
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: auto;
    }
    table { width: 100%; border-collapse: collapse; min-width: 900px; }
    thead tr {
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 2;
    }
    thead th {
      padding: 10px 14px;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      font-weight: 600;
      text-align: left;
      white-space: nowrap;
    }
    thead th:first-child  { color: var(--green); }
    thead th:nth-child(7),
    thead th:nth-child(8) { text-align: center; }
    thead th:nth-child(6),
    thead th:nth-child(9),
    thead th:nth-child(10){ text-align: center; }

    tbody tr {
      border-bottom: 1px solid rgba(26,35,64,0.6);
      transition: filter 0.12s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { filter: brightness(1.18); }
    tbody td {
      padding: 8px 14px;
      font-size: 12px;
      color: var(--text-main);
      line-height: 1.5;
      white-space: nowrap;
    }

    .empty {
      padding: 40px;
      text-align: center;
      color: var(--text-dim);
      font-size: 12px;
      letter-spacing: 0.08em;
    }

    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-icon">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
        <rect x="3" y="3" width="18" height="18" rx="2" stroke="currentColor" stroke-width="2"/>
        <path d="M3 9h18M9 21V9" stroke="currentColor" stroke-width="2"/>
      </svg>
    </div>
    <div>
      <h1>Tabla de Simbolos</h1>
      <div class="subtitle">Historial completo: declaraciones, asignaciones y usos</div>
    </div>
    <div class="badge" id="count-badge">-- simbolos</div>
  </div>

  <!-- leyenda -->
  <div class="leyenda">

    <div class="leyenda-grupo">
      <div class="leyenda-titulo">Evento</div>
      <div class="leyenda-items">
        <div class="leyenda-item"><div class="leyenda-dot" style="background:#22f08a"></div>declaracion</div>
        <div class="leyenda-item"><div class="leyenda-dot" style="background:#00d4ff"></div>asignacion</div>
        <div class="leyenda-item"><div class="leyenda-dot" style="background:#f5a623"></div>uso</div>
        <div class="leyenda-item"><div class="leyenda-dot" style="background:#ff4d6a"></div>no declarada</div>
      </div>
    </div>

    <div class="leyenda-grupo">
      <div class="leyenda-titulo">Tipo</div>
      <div class="leyenda-items">
        <div class="leyenda-item"><div class="leyenda-dot" style="background:#4f8ef7"></div>ontie (int)</div>
        <div class="leyenda-item"><div class="leyenda-dot" style="background:#00d4ff"></div>flote (float)</div>
        <div class="leyenda-item"><div class="leyenda-dot" style="background:#22f08a"></div>duble (double)</div>
      </div>
    </div>

    <div class="leyenda-grupo">
      <div class="leyenda-titulo">Scope</div>
      <div class="leyenda-items">
        <div class="leyenda-item"><div class="leyenda-dot" style="background:#a855f7"></div>global</div>
        <div class="leyenda-item"><div class="leyenda-dot" style="background:#f5a623"></div>local (if / while)</div>
      </div>
    </div>

  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Nombre</th>
          <th>Tipo</th>
          <th>Scope</th>
          <th>Evento</th>
          <th>Valor</th>
          <th>Init</th>
          <th># Asig</th>
          <th># Usos</th>
          <th>Linea</th>
          <th>Col</th>
        </tr>
      </thead>
      <tbody id="tbody">
        <!-- filas inyectadas por Python -->
      </tbody>
    </table>
  </div>

  <script>
    const rows  = document.querySelectorAll('#tbody tr');
    const badge = document.getElementById('count-badge');

    if (rows.length === 0) {
      document.getElementById('tbody').innerHTML =
        '<tr><td colspan="10" class="empty">Sin simbolos -- analiza primero tu codigo</td></tr>';
      badge.textContent = '0 simbolos';
    } else {
      const decls = Array.from(rows).filter(r =>
        r.querySelector('td:nth-child(4)')?.textContent.trim().includes('declaracion')
      ).length;
      badge.textContent =
        decls + ' variable' + (decls !== 1 ? 's' : '') +
        ' / ' + rows.length + ' evento' + (rows.length !== 1 ? 's' : '');
    }
  </script>
</body>
</html>
